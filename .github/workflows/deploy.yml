name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build React app
        run: npm run build
        working-directory: client

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sync server code
        env:
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='client/node_modules' \
            --exclude='server/node_modules' \
            --exclude='client/dist' \
            --exclude='.claude' \
            --exclude='.env' \
            ./ "$EC2_USER@$EC2_HOST:/home/ubuntu/timeloop-snake/"

      - name: Sync built client
        env:
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -avz --delete \
            client/dist/ "$EC2_USER@$EC2_HOST:/home/ubuntu/timeloop-snake/client/dist/"

      - name: Install server deps and restart PM2
        env:
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" bash << 'EOF'
            cd /home/ubuntu/timeloop-snake/server
            npm ci --omit=dev
            pm2 restart timeloop-snake 2>/dev/null || pm2 start index.js --name timeloop-snake
            pm2 save
          EOF

      - name: Verify deployment
        env:
          EC2_USER: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "pm2 show timeloop-snake | grep -q 'online' && echo 'App is online' || (echo 'App is not running' && exit 1)"
